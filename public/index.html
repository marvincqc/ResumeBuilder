<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeBuilder — Build Your Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* same as before - no changes needed */
:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --accent: #2563eb;
  --accent-dark: #1d4ed8;
  --accent-light: #eff6ff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --error: #dc2626;
  --error-light: #fef2f2;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-name { font-weight: 700; font-size: 17px; letter-spacing: -0.3px; }
.lang-select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  outline: none;
}

.progress-wrap {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
  font-weight: 500;
}
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width 0.4s ease;
}

main {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px 80px;
}

.wizard {
  width: 100%;
  max-width: 540px;
}

.step-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 36px 32px;
  animation: fadeUp 0.3s ease;
  display: none;
}
.step-card.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.step-icon {
  width: 52px; height: 52px;
  background: var(--accent-light);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin-bottom: 20px;
}
.step-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.step-q {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.3px;
  margin-bottom: 8px;
}
.step-hint {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
  line-height: 1.5;
}

.field {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  background: #fff;
}
.field:focus { border-color: var(--accent); }
.field.error { border-color: var(--error); background: var(--error-light); }
.field-error {
  font-size: 12px;
  color: var(--error);
  margin-top: 6px;
  font-weight: 500;
  display: none;
}
.field-error.show { display: block; }

.opts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 4px;
}
.opts-grid.single { grid-template-columns: 1fr; }

.opt-btn {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  line-height: 1.3;
}
.opt-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.opt-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }

.multi-done {
  margin-top: 14px;
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  display: none;
}
.multi-done:hover { background: var(--accent-dark); }
.multi-done.show { display: block; }

.nav {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.btn-back {
  flex: 0 0 auto;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 20px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--text); color: var(--text); }
.btn-next {
  flex: 1;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-next:hover { background: var(--accent-dark); }
.btn-next:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

.review-section { margin-bottom: 20px; }
.review-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.review-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--bg);
  cursor: pointer;
  border-radius: 6px;
  padding-left: 4px;
  transition: background 0.1s;
}
.review-row:hover { background: var(--bg); }
.review-row:last-child { border-bottom: none; }
.review-ic { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.review-lb { font-size: 11px; color: var(--muted); font-weight: 500; min-width: 90px; margin-top: 2px; }
.review-val { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.4; }
.review-edit { font-size: 12px; color: var(--accent); font-weight: 500; flex-shrink: 0; }

.btn-submit {
  width: 100%;
  background: var(--success);
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  margin-top: 24px;
  transition: background 0.15s;
}
.btn-submit:hover { background: #15803d; }
.btn-submit:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

.success-screen {
  text-align: center;
  padding: 20px 0;
}
.success-icon {
  font-size: 56px;
  margin-bottom: 20px;
  display: block;
}
.success-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.success-msg {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.6;
}

.loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.loading.show { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { font-size: 15px; font-weight: 500; color: var(--muted); }

@media (max-width: 480px) {
  .step-card { padding: 24px 20px; }
  .step-q { font-size: 19px; }
  .opts-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">

</div>

<main>
  <div class="wizard" id="wizard"></div>
</main>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingMsg">Generating your resume...</div>
</div>

    ],
    reviewSections: {
      personal: "ব্যক্তিগত বিবরণ",
      job: "চাকরির পছন্দ",
      experience: "কর্ম অভিজ্ঞতা",
      skills: "দক্ষতা ও শিক্ষা",
    },
    errors: {
      required: "এই ক্ষেত্রটি প্রয়োজন।",
      dob: "একটি বৈধ তারিখ লিখুন। উদাহরণ: ১৫ জানুয়ারি ১৯৯০",

      salary: "একটি সংখ্যা লিখুন, যেমন ১৮০০",
      daterange: "তারিখ লিখুন, যেমন জানুয়ারি ২০২২ – মার্চ ২০২৪",
    },
    successTitle: (name) => `ধন্যবাদ, ${name}! 🎉`,
    successMsg: (agency) => `আপনার রিজিউম সফলভাবে ${agency}-তে জমা দেওয়া হয়েছে। তারা আপনার তথ্য পর্যালোচনা করবে এবং উপযুক্ত পদ থাকলে আপনার সাথে যোগাযোগ করবে।\n\nশুভকামনা! 🙏`,
  },
};

// ============================================================
// GLOBALS
// ============================================================
let lang = "en";
let currentStep = 0;
let data = {};
let editingKey = null;

// ============================================================
// HELPERS
// ============================================================
function t(key, ...args) {
  const L = CONTENT[lang] || CONTENT.en;
  const v = L[key];
  if (typeof v === "function") return v(...args);
  return v || CONTENT.en[key];
}

function getCurrentStepContent() {
  const content = CONTENT[lang] || CONTENT.en;
  return content.steps[currentStep] || null;
}

function getTotalSteps() {
  return STEPS.length;
}

// ============================================================
// VALIDATION
// ============================================================
function validateField(type, value) {
  if (!value || !value.trim()) return null;
  const errors = t("errors") || CONTENT.en.errors;
  
  switch(type) {
    case "dob": {
      const ok = /^\d{1,2}[\s\/\-][A-Za-z\d]{1,9}[\s\/\-]\d{4}$/.test(value.trim()) || /^\d{4}[\-\/]\d{1,2}[\-\/]\d{1,2}$/.test(value.trim());
      if (!ok) return errors.dob;
      const yr = value.match(/\d{4}/);
      if (yr) { const y=parseInt(yr[0]); if(y<1920||y>new Date().getFullYear()-10) return errors.dob; }
      return null;
    }
    case "phone": { 
      const d=value.replace(/\D/g,""); 
      return (d.length<7||d.length>15)?errors.phone:null; 
    }
    case "email": return !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)?errors.email:null;
    case "salary": return !/\d/.test(value)?errors.salary:null;
    case "daterange": return (/present|current|now/i.test(value)||/\d{4}/.test(value))?null:errors.daterange;
    default: return null;
  }
}

// ============================================================
// RENDER FUNCTIONS
// ============================================================
function render() {
  const totalSteps = getTotalSteps();
  const isReview = currentStep >= totalSteps;
  
  // Update progress
  const pct = Math.round((currentStep / (totalSteps + 1)) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("stepPct").textContent = pct + "%";
  document.getElementById("stepLabel").textContent = isReview ? t("reviewTitle") : t("stepOf", currentStep + 1, totalSteps);
  document.getElementById("progressWrap").style.display = isReview ? "none" : "";
  
  if (isReview) {
    renderReview();
    return;
  }
  
  const stepDef = STEPS[currentStep];
  const content = getCurrentStepContent();
  const val = data[stepDef.key] || "";
  
  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";
  
  const card = document.createElement("div");
  card.className = "step-card active";
  
  let inner = `
    <div class="step-icon">${content.icon}</div>
    <div class="step-label">${content.label}</div>
    <div class="step-q">${content.question}</div>
    ${content.hint ? `<div class="step-hint">${content.hint}</div>` : ""}
  `;
  
  if (stepDef.type === "text") {
    inner += `
      <input class="field" id="mainField" type="text" placeholder="${content.placeholder || ""}" value="${escHtml(val)}" />
      <div class="field-error" id="fieldErr"></div>
    `;
    if (stepDef.optional) {
      inner += `<div style="margin-top:10px;"><button class="opt-btn" style="width:100%;text-align:center;color:var(--muted);" onclick="skipField()">${t("naBtn")}</button></div>`;
    }
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
      <button class="btn-next" onclick="goNext()">${t("next")}</button>
    </div>`;
  } else if (stepDef.type === "opts") {
    const options = content.options || [];
    const cols = options.length <= 3 ? "single" : "";
    inner += `<div class="opts-grid ${cols}" id="optsGrid">`;
    options.forEach(o => {
      const sel = val === o ? "selected" : "";
      inner += `<button class="opt-btn ${sel}" onclick="selectOpt(this,'${escHtml(o)}')">${o}</button>`;
    });
    inner += `</div>`;
    if (stepDef.optional) inner += `<button class="opt-btn" style="width:100%;margin-top:10px;text-align:center;color:var(--muted);" onclick="skipField()">${t("naBtn")}</button>`;
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
      <button class="btn-next" id="nextBtn" ${!val ? 'disabled' : ''} onclick="goNext()">${t("next")}</button>
    </div>`;
  } else if (stepDef.type === "multi") {
    const options = content.options || [];
    const selected = val ? val.split(", ").filter(Boolean) : [];
    inner += `<div class="opts-grid" id="optsGrid">`;
    options.forEach(o => {
      const sel = selected.includes(o) ? "selected" : "";
      inner += `<button class="opt-btn ${sel}" onclick="toggleMulti(this,'${escHtml(o)}')">${o}</button>`;
    });
    inner += `</div>`;
    inner += `<button class="multi-done ${selected.length > 0 ? 'show' : ''}" id="doneBtn" onclick="goNext()">${t("doneBtn")}</button>`;
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
    </div>`;
  }
  
  card.innerHTML = inner;
  wizard.appendChild(card);
  
  if (stepDef.type === "text") {
    setTimeout(() => document.getElementById("mainField")?.focus(), 100);
    document.getElementById("mainField")?.addEventListener("keydown", e => { if(e.key === "Enter") goNext(); });
  }
}

function renderReview() {
  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";
  const card = document.createElement("div");
  card.className = "step-card active";
  
  const sections = [
    { title: t("reviewSections").personal, keys: ["agency","name","dob","nationality","country","city","phone","email"] },
    { title: t("reviewSections").job,      keys: ["jobType","workArrange","availability","salary","experience"] },
    { title: t("reviewSections").experience, keys: ["job1Title","job1Company","job1Dates","job2Title","job2Company","job2Dates","job3Title","job3Company","job3Dates"] },
    { title: t("reviewSections").skills,   keys: ["skills","certs","education","languages"] },
  ];
  
  let html = `
    <div class="step-icon">📋</div>
    <div class="step-q">${t("reviewTitle")}</div>
    <div class="step-hint">${t("reviewHint")} ${t("editHint")}</div>
  `;
  
  sections.forEach(sec => {
    let rows = "";
    sec.keys.forEach(k => {
      const stepIndex = STEPS.findIndex(s => s.key === k);
      if (stepIndex === -1) return;
      const stepDef = STEPS[stepIndex];
      const content = (CONTENT[lang] || CONTENT.en).steps[stepIndex];
      if (!content) return;
      const v = data[k];
      if (!v && stepDef.optional) return;
      rows += `<div class="review-row" onclick="editField('${k}')">
        <span class="review-ic">${content.icon}</span>
        <span class="review-lb">${content.label}</span>
        <span class="review-val">${escHtml(v || "—")}</span>
        <span class="review-edit">Edit</span>
      </div>`;
    });
    if (!rows.trim()) return;
    html += `<div class="review-section">
      <div class="review-section-title">${sec.title}</div>
      ${rows}
    </div>`;
  });
  
  html += `<button class="btn-submit" onclick="submitResume()">${t("submit")}</button>`;
  html += `<div class="nav"><button class="btn-back" onclick="goBack()">${t("back")}</button></div>`;
  
  card.innerHTML = html;
  wizard.appendChild(card);
}

// ============================================================
// ACTIONS
// ============================================================
function selectOpt(btn, val) {
  btn.closest(".opts-grid").querySelectorAll(".opt-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  const stepDef = STEPS[currentStep];
  data[stepDef.key] = val;
  const nb = document.getElementById("nextBtn");
  if (nb) nb.disabled = false;
}

function toggleMulti(btn, val) {
  btn.classList.toggle("selected");
  const stepDef = STEPS[currentStep];
  const selected = Array.from(btn.closest(".opts-grid").querySelectorAll(".opt-btn.selected")).map(b => b.textContent.trim());
  data[stepDef.key] = selected.join(", ");
  const db = document.getElementById("doneBtn");
  if (db) { db.classList.toggle("show", selected.length > 0); }
}

function skipField() {
  const stepDef = STEPS[currentStep];
  data[stepDef.key] = "";
  advance();
}

function goNext() {
  const stepDef = STEPS[currentStep];
  const errors = t("errors") || CONTENT.en.errors;
  
  if (stepDef.type === "text") {
    const field = document.getElementById("mainField");
    const val = field?.value.trim() || "";
    const errEl = document.getElementById("fieldErr");
    
    if (!val && !stepDef.optional) { 
      showErr(errEl, errors.required); 
      return; 
    }
    if (val && stepDef.validate) {
      const err = validateField(stepDef.validate, val);
      if (err) { showErr(errEl, err); return; }
    }
    data[stepDef.key] = val;
  } else if (stepDef.type === "multi") {
    if (!data[stepDef.key] || !data[stepDef.key].trim()) return;
  } else if (stepDef.type === "opts") {
    if (!data[stepDef.key]) return;
  }
  
  if (editingKey) { 
    editingKey = null; 
    currentStep = getTotalSteps(); 
    render(); 
    return; 
  }
  advance();
}

function advance() {
  currentStep++;
  // Skip optional job2/job3 fields if title is blank
  while (currentStep < getTotalSteps()) {
    const stepDef = STEPS[currentStep];
    if (stepDef.key === "job2Company" || stepDef.key === "job2Dates") {
      if (!data["job2Title"]) { currentStep++; continue; }
    }
    if (stepDef.key === "job3Title" && !data["job2Title"]) { currentStep++; continue; }
    if (stepDef.key === "job3Company" || stepDef.key === "job3Dates") {
      if (!data["job3Title"]) { currentStep++; continue; }
    }
    break;
  }
  render();
  window.scrollTo(0,0);
}

function goBack() {
  if (editingKey) { 
    editingKey = null; 
    currentStep = getTotalSteps(); 
    render(); 
    return; 
  }
  if (currentStep > 0) { 
    currentStep--; 
    render(); 
    window.scrollTo(0,0); 
  }
}

function editField(key) {
  const idx = STEPS.findIndex(s => s.key === key);
  if (idx < 0) return;
  editingKey = key;
  currentStep = idx;
  render();
  window.scrollTo(0,0);
}

function showErr(el, msg) {
  el.textContent = msg;
  el.classList.add("show");
  document.querySelector(".field")?.classList.add("error");
}

function changeLang(l) {
  lang = l;
  render();
}

// ============================================================
// SUBMIT
// ============================================================
async function submitResume() {
  const btn = document.querySelector(".btn-submit");
  if (btn) btn.disabled = true;
  
  const loadingEl = document.getElementById("loading");
  const loadingMsg = document.getElementById("loadingMsg");
  loadingMsg.textContent = t("submitting");
  loadingEl.classList.add("show");
  
  try {
    const res = await fetch("/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data, lang }),
    });
    const json = await res.json();
    loadingEl.classList.remove("show");
    if (json.ok) {
      showSuccess();
    } else {
      alert("Submission failed: " + (json.error || "Unknown error"));
      if (btn) btn.disabled = false;
    }
  } catch(err) {
    loadingEl.classList.remove("show");
    alert("Network error. Please try again.");
    if (btn) btn.disabled = false;
  }
}

function showSuccess() {
  document.getElementById("progressWrap").style.display = "none";
  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";
  const card = document.createElement("div");
  card.className = "step-card active";
  card.innerHTML = `
    <div class="success-screen">
      <span class="success-icon">🎉</span>
      <div class="success-title">${t("successTitle", data.name?.split(" ")[0] || "")}</div>
      <div class="success-msg">${t("successMsg", data.agency || "the agency").replace(/\n/g,"<br>")}</div>
    </div>
  `;
  wizard.appendChild(card);
}

function escHtml(str) {
  return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ============================================================
// INIT
// ============================================================
document.getElementById("langSel").addEventListener("change", (e) => changeLang(e.target.value));
render();
</script>
